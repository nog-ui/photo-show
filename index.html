const photoFiles = [

// ═══════════════════════════════════════════════
//  CANVAS TEXTURE GENERATORS
// ═══════════════════════════════════════════════

// Sun surface texture — granular with limb darkening
function createSunTexture(size=512) {
  const canvas = document.createElement('canvas');
  canvas.width=size; canvas.height=size;
  const ctx = canvas.getContext('2d');
  const cx=size/2, cy=size/2, R=size/2;

  // Base radial: bright white-hot center → yellow → orange → darker edge
  const grad = ctx.createRadialGradient(cx,cy,R*0.05,cx,cy,R);
  grad.addColorStop(0,'#fffef0');
  grad.addColorStop(0.08,'#fff8c0');
  grad.addColorStop(0.2,'#ffe860');
  grad.addColorStop(0.4,'#ffbb22');
  grad.addColorStop(0.65,'#ff8800');
  grad.addColorStop(0.85,'#dd5500');
  grad.addColorStop(0.96,'#993310');
  grad.addColorStop(1,'#662208');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();

  // Granular surface (sunspots + bright granules)
  for (let i=0;i<300;i++) {
    const gx=cx+(Math.random()-0.5)*size*0.95;
    const gy=cy+(Math.random()-0.5)*size*0.95;
    const dist = Math.sqrt((gx-cx)**2+(gy-cy)**2);
    if (dist>R*0.92) continue;
    const gr=1.5+Math.random()*8;
    const alpha=0.02+Math.random()*0.08;
    const bright=Math.random()>0.7;
    ctx.beginPath(); ctx.arc(gx,gy,gr,0,Math.PI*2);
    ctx.fillStyle=bright
      ?`rgba(255,255,240,${alpha})`
      :`rgba(180,80,20,${alpha})`;
    ctx.fill();
  }

  // Solar flare-like bright streaks near surface
  for (let i=0;i<15;i++) {
    const angle=Math.random()*Math.PI*2;
    const sx=cx+Math.cos(angle)*R*0.85;
    const sy=cy+Math.sin(angle)*R*0.85;
    ctx.save();
    ctx.globalAlpha=0.06+Math.random()*0.1;
    const streak=ctx.createRadialGradient(sx,sy,0,sx,sy,20+Math.random()*40);
    streak.addColorStop(0,'rgba(255,255,200,0.8)');
    streak.addColorStop(1,'rgba(255,200,50,0)');
    ctx.fillStyle=streak;
    ctx.fillRect(sx-40,sy-40,80,80);
    ctx.restore();
  }

  const tex=new THREE.CanvasTexture(canvas);
  tex.needsUpdate=true; tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

// Corona glow texture
function createCoronaTexture(innerBright, outerFade, size=512) {
  const canvas=document.createElement('canvas');
  canvas.width=size; canvas.height=size;
  const ctx=canvas.getContext('2d');
  const cx=size/2, cy=size/2;

  const grad=ctx.createRadialGradient(cx,cy,size*0.18,cx,cy,size*0.5);
  grad.addColorStop(0,innerBright);
  grad.addColorStop(0.15,innerBright);
  grad.addColorStop(0.5,outerFade);
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,size,size);

  // Wispy corona streamers
  for (let w=0;w<12;w++) {
    const angle=(w/12)*Math.PI*2+Math.random()*0.15;
    const wx=cx+Math.cos(angle)*size*0.1;
    const wy=cy+Math.sin(angle)*size*0.1;
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.08+Math.random()*0.1;
    const wgrad=ctx.createRadialGradient(wx,wy,0,wx,wy,size*0.35+Math.random()*size*0.1);
    wgrad.addColorStop(0,innerBright);
    wgrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=wgrad; ctx.fillRect(0,0,size,size);
    ctx.restore();
  }

  const tex=new THREE.CanvasTexture(canvas);
  tex.needsUpdate=true; tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

// Planet texture (gas giant)
function createPlanetTexture(baseHue, size=256) {
  const canvas=document.createElement('canvas');
  canvas.width=size; canvas.height=size/2;
  const ctx=canvas.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,size/2);
  grad.addColorStop(0,`hsl(${baseHue},40%,18%)`);
  grad.addColorStop(0.15,`hsl(${baseHue},55%,35%)`);
  grad.addColorStop(0.3,`hsl(${baseHue},35%,22%)`);
  grad.addColorStop(0.45,`hsl(${baseHue+20},50%,40%)`);
  grad.addColorStop(0.55,`hsl(${baseHue-10},45%,28%)`);
  grad.addColorStop(0.7,`hsl(${baseHue},40%,20%)`);
  grad.addColorStop(0.85,`hsl(${baseHue+10},50%,30%)`);
  grad.addColorStop(1,`hsl(${baseHue},30%,15%)`);
  ctx.fillStyle=grad; ctx.fillRect(0,0,size,size/2);
  for (let b=0;b<20;b++){
    const by=(b/20)*size/2;
    ctx.strokeStyle=`rgba(255,255,255,${0.02+Math.random()*0.06})`;
    ctx.lineWidth=2+Math.random()*8;
    ctx.beginPath(); ctx.moveTo(0,by);
    for (let x=0;x<=size;x+=size/40) ctx.lineTo(x,by+Math.sin(x*0.05+b*3)*4);
    ctx.stroke();
  }
  for (let sp=0;sp<5;sp++){
    const sx=Math.random()*size, sy=Math.random()*size/2, sr=3+Math.random()*15;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,sr);
    sg.addColorStop(0,`hsla(${baseHue+30},60%,55%,0.6)`);
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(sx-sr,sy-sr,sr*2,sr*2);
  }
  const tex=new THREE.CanvasTexture(canvas);
  tex.needsUpdate=true; tex.colorSpace=THREE.SRGBColorSpace;
  tex.wrapS=THREE.RepeatWrapping; tex.wrapU=THREE.RepeatWrapping;
  return tex;
}

// Nebula cloud (for background)
function createNebulaTexture(innerColor, outerColor, size=512) {
  const canvas=document.createElement('canvas');
  canvas.width=size; canvas.height=size;
  const ctx=canvas.getContext('2d');
  const cx=size/2,cy=size/2;
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,size*0.5);
  grad.addColorStop(0,innerColor); grad.addColorStop(0.25,innerColor);
  grad.addColorStop(0.5,outerColor); grad.addColorStop(0.75,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,size,size);
  for (let w=0;w<8;w++){
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.1+Math.random()*0.1;
    const wx=cx+(Math.random()-0.5)*size*0.5, wy=cy+(Math.random()-0.5)*size*0.5;
    const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,size*0.3+Math.random()*size*0.15);
    wg.addColorStop(0,innerColor); wg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=wg; ctx.fillRect(0,0,size,size);
    ctx.restore();
  }
  for (let s=0;s<60;s++){
    const sx=cx+(Math.random()-0.5)*size*0.9, sy=cy+(Math.random()-0.5)*size*0.9;
    ctx.beginPath(); ctx.arc(sx,sy,1+Math.random()*4,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.03+Math.random()*0.06})`; ctx.fill();
  }
  const tex=new THREE.CanvasTexture(canvas);
  tex.needsUpdate=true; tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false, powerPreference:'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Lighting

keyLight.position.set(8, 14, 5);

// Tilt is an inclination angle; tiltDir is the direction of the ascending node
const orbitDefs = [
  { radius:2.4, height:SUN_Y, tilt:0.12, tiltDir:0.3,  count:7,  speed:0.18, scale:0.72 },
  { radius:3.7, height:SUN_Y+0.25, tilt:0.20, tiltDir:1.8, count:10, speed:0.14, scale:0.65 },
  { radius:5.2, height:SUN_Y-0.15, tilt:0.08, tiltDir:3.5, count:12, speed:0.11, scale:0.60 },
  { radius:6.8, height:SUN_Y+0.35, tilt:0.25, tiltDir:5.0, count:14, speed:0.09, scale:0.56 },
  { radius:8.3, height:SUN_Y-0.30, tilt:0.17, tiltDir:2.2, count:15, speed:0.07, scale:0.52 },
  { radius:9.8, height:SUN_Y+0.10, tilt:0.30, tiltDir:4.0, count:11, speed:0.055, scale:0.48 },
];
// Verify total: 7+10+12+14+15+11 = 69 ✓

const photoMeshes = [];
const frameGroups = [];

function createPhotoFrame(photo, index, scale=1.0) {
  const group = new THREE.Group();
  group.name = `photo-${index}`;
  const pw = 1.2*scale;
  let ph;
  if (photo.ratio==='tall') ph=1.55*scale;
  else if (photo.ratio==='wide') ph=0.72*scale;
  else ph=1.2*scale;

  const photoGeom = new THREE.PlaneGeometry(pw, ph);
  const photoMat = new THREE.MeshStandardMaterial({ color:0x1a1830, roughness:0.4, metalness:0.05 });
  const photoPlane = new THREE.Mesh(photoGeom, photoMat);
  photoPlane.castShadow = true;
  group.add(photoPlane);

  const borderGeom = new THREE.PlaneGeometry(pw+0.07, ph+0.07);
  const borderMat = new THREE.MeshStandardMaterial({ color:0x282445, roughness:0.28, metalness:0.45 });
  const border = new THREE.Mesh(borderGeom, borderMat);
  border.position.z = -0.01;
  border.castShadow = true;
  group.add(border);

  group.userData = { photoIndex:index, photoData:photo, photoPlane, photoMat, pw, ph };
  return group;
}

// Distribute all 69 photos across orbital rings
let photoIdx = 0;
for (const orbit of orbitDefs) {
  const { radius, height, tilt, tiltDir, count, speed, scale } = orbit;
  for (let j=0; j<count; j++) {
    if (photoIdx >= TOTAL) break;
    const photo = photos[photoIdx];
    const fg = createPhotoFrame(photo, photoIdx, scale);

    // Evenly spaced starting angle
    const startAngle = (j/count)*Math.PI*2 + (Math.random()-0.5)*0.08;

    // Position on tilted orbit
    const x = Math.cos(startAngle)*radius;
    const z = Math.sin(startAngle)*radius;
    // Tilt: vertical offset based on position along tilted axis
    const tiltOffset = Math.sin(startAngle+tiltDir)*radius*Math.sin(tilt);
    const y = height+tiltOffset;

    fg.position.set(x, y, z);
    // Face outward from Sun
    fg.rotation.y = startAngle+Math.PI;
    fg.rotation.z = (Math.random()-0.5)*0.15;
    fg.rotation.x = (Math.random()-0.5)*0.1;

    scene.add(fg);

    frameGroups.push({
      group: fg,
      orbitRadius: radius,
      orbitHeight: height,
      orbitTilt: tilt,
      orbitTiltDir: tiltDir,
      orbitSpeed: speed,
      currentAngle: startAngle,
      baseScale: scale,
      swayPhase: Math.random()*Math.PI*2,
    });
    photoMeshes.push({ mesh:fg, index:photoIdx });
    photoIdx++;
  }
}

//  RAYCASTER + TOOLTIP
// ═══════════════════════════════════════════════
const raycaster = new THREE.Raycaster(); raycaster.far=32;
const mouse = new THREE.Vector2();

function getIntersection(event) {
  mouse.x=(event.clientX/window.innerWidth)*2-1;
  mouse.y=-(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const targets=photoMeshes.map(p=>p.mesh);
  const intersects=raycaster.intersectObjects(targets, true);
  if (intersects.length>0){
    let obj=intersects[0].object;
    while(obj){
      const found=photoMeshes.find(p=>p.mesh===obj);
      if (found){
        const wp=new THREE.Vector3(); found.mesh.getWorldPosition(wp);
        const sp=wp.clone().project(camera);
        return {
          index:found.index,
          screenX:(sp.x*0.5+0.5)*window.innerWidth,
          screenY:(-sp.y*0.5+0.5)*window.innerHeight,
          behindCamera:sp.z>1,
        };
      }
      obj=obj.parent;
    }
  }
  return null;
}

const tooltip=document.getElementById('photoTooltip');
const ttTitle=document.getElementById('ttTitle');
const ttLoc=document.getElementById('ttLocation');
const ttDate=document.getElementById('ttDate');
const ttCamera=document.getElementById('ttCamera');
const ttSettings=document.getElementById('ttSettings');
const ttViewBtn=document.getElementById('ttViewBtn');
let tipIdx=-1, tipVis=false;

function showTooltip(idx,x,y){
  const p=photos[idx];
  ttTitle.textContent=p.title; ttLoc.textContent=p.location;
  ttDate.textContent=p.date; ttCamera.textContent=p.camera;
  ttSettings.textContent=p.settings; tipIdx=idx;
  const tw=tooltip.offsetWidth||230, th=tooltip.offsetHeight||180;
  let left=x-tw/2, top=y-th-20;
  if (left<10) left=10;
  if (left+tw>window.innerWidth-10) left=window.innerWidth-tw-10;
  if (top<10) top=y+25;
  tooltip.style.left=left+'px'; tooltip.style.top=top+'px';
  tooltip.classList.add('visible'); tipVis=true;
}
function hideTooltip(){tooltip.classList.remove('visible');tipVis=false;tipIdx=-1;}

renderer.domElement.addEventListener('mousemove',(e)=>{
  const r=getIntersection(e);
  if (r&&!r.behindCamera){
    if (tipIdx!==r.index||!tipVis) showTooltip(r.index,r.screenX,r.screenY);
    renderer.domElement.style.cursor='pointer';
  }else{hideTooltip();renderer.domElement.style.cursor='grab';}
});
renderer.domElement.addEventListener('mouseleave',hideTooltip);

let clickStart={x:0,y:0}, isDragging=false;
renderer.domElement.addEventListener('pointerdown',(e)=>{clickStart={x:e.clientX,y:e.clientY};isDragging=false;});
renderer.domElement.addEventListener('pointermove',(e)=>{
  if (Math.abs(e.clientX-clickStart.x)>5||Math.abs(e.clientY-clickStart.y)>5) isDragging=true;
});
renderer.domElement.addEventListener('pointerup',(e)=>{
  if (isDragging) return;
  const r=getIntersection(e);
  if (r&&!r.behindCamera){
    if (e.pointerType==='touch'){
      if (tipVis&&tipIdx===r.index){openLightbox(r.index);hideTooltip();}
      else showTooltip(r.index,r.screenX,r.screenY);
    }else{openLightbox(r.index);hideTooltip();}
  }else hideTooltip();
});
ttViewBtn.addEventListener('click',(e)=>{
  e.stopPropagation();
  if (tipIdx>=0){openLightbox(tipIdx);hideTooltip();}
});

function openLightbox(idx){curIdx=idx;updateLb();lightbox.classList.add('open');document.body.style.cursor='default';}

function updateLb(){
  const p=photos[curIdx];

  lbLoc.textContent=p.location; lbDate.textContent=p.date;

  lbImg.src=p.fullSrc;
  lbImg.onload=()=>{lbImg.style.opacity='1';};
  lbImg.onerror=()=>{lbImg.style.opacity='1';};
}
function lbNav(dir){curIdx=(curIdx+dir+TOTAL)%TOTAL;updateLb();}

document.getElementById('lbClose').addEventListener('click',(e)=>{e.stopPropagation();closeLightbox();});
document.getElementById('lbPrev').addEventListener('click',(e)=>{e.stopPropagation();lbNav(-1);});

document.addEventListener('keydown',(e)=>{
  if (!lightbox.classList.contains('open')) return;
  if (e.key==='Escape') closeLightbox();
  if (e.key==='ArrowLeft') lbNav(-1);
  if (e.key==='ArrowRight') lbNav(1);
});
let lbTX=0;

lightbox.addEventListener('touchend',(e)=>{
  const dx=e.changedTouches[0].clientX-lbTX;

//  TEXTURE LOADING
// ═══════════════════════════════════════════════
const texLoader = new THREE.TextureLoader();
let loadedCount = 0;

function loadTextures(){
  const bar=document.getElementById('loadingBar');
  frameGroups.forEach(({group})=>{
    const {photoData, photoMat}=group.userData;
    texLoader.load(
      photoData.thumbSrc,
      (tex)=>{
        tex.colorSpace=THREE.SRGBColorSpace;
        tex.minFilter=THREE.LinearMipmapLinearFilter;
        tex.magFilter=THREE.LinearFilter;
        tex.generateMipmaps=true;
        photoMat.map=tex; photoMat.color.set(0xffffff);
        photoMat.needsUpdate=true;
        loadedCount++;
        updateLoad(bar);
        if (loadedCount===TOTAL) hideLoading();
      },
      undefined,
      ()=>{
        loadedCount++;
        updateLoad(bar);
        if (loadedCount===TOTAL) hideLoading();
      }
    );
  });
}
function updateLoad(bar){
  const pct=Math.round((loadedCount/TOTAL)*100);
  document.getElementById('loadingText').textContent=`星河加载中... ${loadedCount}/${TOTAL}`;
  bar.style.width=pct+'%';
}
function hideLoading(){
  setTimeout(()=>{
    document.getElementById('loading').classList.add('hidden');
    setTimeout(()=>{
      document.getElementById('hint').style.opacity='0';
      document.getElementById('gestureHints').style.opacity='0';
    },12000);
  },400);
}

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  const dt=Math.min(clock.getDelta(),0.1);
  controls.update();

  // ── Photos orbit around the Sun ──
  frameGroups.forEach(fg=>{
    // Advance orbital angle
    fg.currentAngle += fg.orbitSpeed*dt;
    const a=fg.currentAngle;
    const r=fg.orbitRadius;

    // Position on tilted orbit
    const x=Math.cos(a)*r;
    const z=Math.sin(a)*r;
    const to=Math.sin(a+fg.orbitTiltDir)*r*Math.sin(fg.orbitTilt);
    const y=fg.orbitHeight+to;

    // Gentle bobbing
    const bob=Math.sin(t*0.5+fg.swayPhase)*0.1;

    fg.group.position.set(x, y+bob, z);
    // Face outward from Sun
    fg.group.rotation.y=a+Math.PI;
    fg.group.rotation.z+=Math.sin(t*0.7+fg.swayPhase)*0.0003;
  });

  // ── Sun animation ──
  sunGroup.rotation.y+=0.002;
  const sunPulse=1+Math.sin(t*1.5)*0.02+Math.sin(t*3.2)*0.01;
  sunSphere.scale.setScalar(sunPulse);
  sunLight.intensity=50+Math.sin(t*1.8)*3+Math.sin(t*4.1)*2;
  innerCorona.material.opacity=0.7+Math.sin(t*2.0)*0.1;
  midCorona.material.opacity=0.45+Math.sin(t*1.7)*0.08;
  outerCorona.material.opacity=0.3+Math.sin(t*1.3)*0.05;

  // Solar flares
  flareParams.forEach(fp=>{
    const {mesh, baseR, phi, theta, phase, speed, amp}=fp;
    const r=baseR+Math.sin(t*speed+phase)*amp;
    mesh.position.set(
      Math.cos(phi)*Math.sin(theta)*r,
      Math.cos(theta)*r,
      Math.sin(phi)*Math.sin(theta)*r
    );
    mesh.material.opacity=0.4+Math.sin(t*speed+phase)*0.4;
  });

  // ── Dust orbit ──
  const dArr=dustParticles.geometry.attributes.position.array;
  for (let i=0;i<dustParams.length;i++){
    const p=dustParams[i];
    const a=p.angle+t*p.orbitSpeed;
    dArr[i*3]=Math.cos(a)*p.radius;
    dArr[i*3+1]=p.baseY+Math.sin(t*p.speed+p.phase)*p.vertAmp;
    dArr[i*3+2]=Math.sin(a)*p.radius;
  }
  dustParticles.geometry.attributes.position.needsUpdate=true;
  dustParticles.material.opacity=0.3+Math.sin(t*1.1)*0.07+Math.sin(t*2.8)*0.05;

  // ── Inner dust drift ──
  const inArr=innerDust.geometry.attributes.position.array;
  for (let i=0;i<inArr.length;i+=3){
    inArr[i+1]+=0.002+Math.sin(t+i*0.1)*0.001;
    if (inArr[i+1]>SUN_Y+2) inArr[i+1]=SUN_Y-2;
  }
  innerDust.geometry.attributes.position.needsUpdate=true;

  // ── Nebula sway ──
  nebulaSprites.forEach(s=>{
    s.position.y=s.userData.baseY+Math.sin(t*s.userData.speed+s.userData.phase)*0.5;
    s.material.opacity=0.3+Math.sin(t*0.7+s.userData.phase)*0.12;
  });

  // ── Planet rotation ──
  planets.forEach(p=>{
    if (p.userData.rotSpeed) p.userData.planet.rotation.y+=p.userData.rotSpeed*0.01;
  });

  // ── Stars ──
  stars.rotation.y+=0.00012;
  stars.rotation.x+=0.00004;
  stars.material.opacity=0.5+Math.sin(t*0.3)*0.08;

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
window.addEventListener('orientationchange',()=>{
  setTimeout(()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  },300);
});

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
loadTextures();
animate();
console.log('☀️ 光影星河已就绪 — %c太阳系摄影展%c','color:#ffbb44;font-size:16px;','');
console.log(`   ${TOTAL} 张作品围绕太阳运行 · ${STAR_COUNT} 颗恒星 · ${orbitDefs.length} 条轨道`);

// Fallback: if loading takes >15s, show error
setTimeout(() => {
  if (loadedCount < TOTAL) {
    document.getElementById('loadingText').textContent = '加载缓慢，请刷新页面重试';
    document.getElementById('loadingBar').style.background = '#ff6644';
  }
}, 15000);
</script>
